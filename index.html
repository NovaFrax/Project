<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Methodology Diagram</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            transition: background-color 0.5s;
        }
        
        .diagram {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 20px;
            animation: fade-in 1s;
        }
        
        .workflow {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 5px solid #007BFF;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bounce 2s infinite;
        }
        
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="diagram">
        <h1>Agile Methodology Diagram</h1>
        <div class="workflow">
            <p>Interactive Workflow Here</p>
            <!-- Add each step of the Agile methodology with animated transitions and visual indicators -->
        </div>
    </div>
</body>
</html>
